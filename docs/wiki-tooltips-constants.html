    <title>New tooltips for constants</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            width: 100%;
            max-width: 90%;
            margin: 20px auto;
            background-color: #f4f4f9;
        }
        
        #searchInput {
            width: 100%;
            padding: 12px;
            font-size: 16px;
            border: 2px solid #ccc;
            border-radius: 8px;
            margin-bottom: 20px;
            box-sizing: border-box;
        }
        
        #output {
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            padding: 10px;
            border: 1px solid #ddd;
            border-radius: 4px;
            background-color: #fcfcfc;
            box-sizing: border-box;
        }
        
        .no-results {
            color: #888;
            font-style: italic;
        }
    </style>

    "tooltip": "Prim parameter setting for PRIM_ALPHA_MODE.\nIndicates that the diffuse texture's alpha channel should be rendered as an emissivity mask.",

        const searchInput = document.getElementById('searchInput');
        const jsonOutput = document.getElementById('jsonOutput');

        function renderJSON(query = "") {
            const lowerCaseQuery = query.toLowerCase();
            const filteredData = {};

            for (const funcName in lslData) {
                if (funcName.toLowerCase().includes(lowerCaseQuery)) {
                    filteredData[funcName] = lslData[funcName];
                }
            }

            const jsonString = JSON.stringify(filteredData, null, 2);
            jsonOutput.textContent = jsonString;
            if (window.Prism) {
                Prism.highlightElement(jsonOutput);
            }
        }

        searchInput.addEventListener('input', (event) => {
            renderJSON(event.target.value);
        });

        renderJSON();
    </script>
