      "effects"
    ]
  },
  "llSetExperienceKey": {
    "arguments": [
      {
        "experienceid": {
          "tooltip": "",
          "type": "key"
        }
      }
    ],
    "deprecated": true,
    "energy": 10,
    "func-id": 386,
    "private": true,
    "return": "integer",
    "sleep": 0,
    "tooltip": "",
    "categories": [
      "experience"
    ]
  }
        };

        const searchInput = document.getElementById('searchInput');
        const jsonOutput = document.getElementById('jsonOutput');

        function renderJSON(query = "") {
            const lowerCaseQuery = query.toLowerCase();
            const filteredData = {};

            for (const funcName in lslData) {
                if (funcName.toLowerCase().includes(lowerCaseQuery)) {
                    filteredData[funcName] = lslData[funcName];
                }
            }

            const jsonString = JSON.stringify(filteredData, null, 2);
            jsonOutput.textContent = jsonString;
            if (window.Prism) {
                Prism.highlightElement(jsonOutput);
            }
        }

        searchInput.addEventListener('input', (event) => {
            renderJSON(event.target.value);
        });

        renderJSON();
    </script>

</body>
